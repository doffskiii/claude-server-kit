name: Test Setup

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-setup:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run setup.sh
        run: sudo bash setup.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Verify installation
        run: |
          sudo bash -c '
          set -e
          echo "=== Checking uv ==="
          /root/.local/bin/uv --version

          echo "=== Checking Node.js ==="
          node --version

          echo "=== Checking PM2 ==="
          pm2 --version

          echo "=== Checking Brain MCP ==="
          test -f /root/brain/src/brain/server.py
          test -f /root/brain/pyproject.toml

          echo "=== Checking vault structure ==="
          test -f /root/vault/dashboard.md
          test -f /root/vault/inbox/INBOX.md
          test -f /root/vault/conversations/CONVERSATIONS.md
          test -f /root/vault/decisions/DECISIONS.md
          test -f /root/vault/knowledge/personal/PERSONAL.md
          test -f /root/vault/knowledge/projects/PROJECTS.md
          test -d /root/vault/.git

          echo "=== Checking CLAUDE.md ==="
          test -f /root/CLAUDE.md
          grep -q "YOUR_NAME" /root/CLAUDE.md

          echo "=== Checking MCP config ==="
          test -f /root/.mcp.json
          grep -q "brain" /root/.mcp.json
          grep -q "context7" /root/.mcp.json

          echo "=== Checking settings.json ==="
          test -f /root/.claude/settings.json
          grep -q "mcp__brain__" /root/.claude/settings.json
          grep -q "mcp__context7__" /root/.claude/settings.json

          echo "=== Checking onboarding skill ==="
          test -f /root/.claude/skills/onboarding/SKILL.md
          grep -q "Step 0" /root/.claude/skills/onboarding/SKILL.md
          grep -q "Step 11" /root/.claude/skills/onboarding/SKILL.md

          echo "=== Checking memory template ==="
          test -f /root/.claude/projects/-root/memory/MEMORY.md

          echo "=== Checking librarian ==="
          test -f /root/librarian/SYSTEM.md
          test -f /root/librarian/CHECKLIST.md
          test -f /root/librarian/run.sh

          echo "=== Checking scripts ==="
          test -f /root/scripts/backup.sh
          test -f /root/scripts/reminders/reminder.sh

          echo "=== All file checks passed ==="
          '

      - name: Verify Brain imports
        run: |
          sudo bash -c '
          cd /root/brain
          /root/.local/bin/uv run python -c "from brain.server import mcp; print(f\"Brain loaded: {len(mcp._tools)} tools\")"
          '

      - name: Verify Whisper server imports
        run: |
          sudo bash -c '
          cd /root/brain
          /root/.local/bin/uv run python -c "from brain.whisper_server import app; print(\"Whisper server OK\")"
          '

      - name: Summary
        run: |
          sudo bash -c '
          echo "=== Setup Test Complete ==="
          echo "uv: $(/root/.local/bin/uv --version)"
          echo "node: $(node --version)"
          echo "pm2: $(pm2 --version)"
          echo "vault files: $(find /root/vault -name "*.md" | wc -l)"
          echo "brain tools: $(cd /root/brain && /root/.local/bin/uv run python -c "from brain.server import mcp; print(len(mcp._tools))")"
          echo "==========================="
          '
